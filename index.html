<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>JS Game</title>
  </head>
  <body>
    <div class="content">
      <h2 class="content__title">Rock Paper Scissors</h2>
      
      <div class="wrapper">
        <div class="wrapper__element">
            <img class="first__player" src="./paper.png" alt="">
            <p class="player">1-player</p>
        </div>
        <div class="wrapper__element">
            <img class="second__player" src="./paper.png" alt="">
            <p class="player">2-player</p>
        </div>
      </div>

      <button class="btn">start</button>
      <p class="result"></p>

    </div>

    <script src="./app.js"></script>
  </body>
</html>
